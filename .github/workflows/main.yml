name: CI/CD Build and Push Docker Image

# 1. Định nghĩa sự kiện kích hoạt workflow
on:
  push:
    branches: [ "master" ] # Chạy mỗi khi push code vào nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest # Sử dụng môi trường ảo Ubuntu của GitHub

    steps:
      # Bước 2: Lấy mã nguồn từ repo về máy ảo
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 5: Đăng nhập vào Docker Hub sử dụng Secrets đã tạo
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Bước 6: Build Docker Image và Push lên Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Thay 'user-cua-ban' thành Docker ID của bạn, 'repo-name' thành tên repo trên Docker Hub
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/spring-boot-app:latest
            ${{ secrets.DOCKER_USERNAME }}/spring-boot-app:${{ github.sha }}

                - name: Triển khai lên DevOps Classroom
          run: |
            REPO="anhtai26/spring-boot-app"
            CONTAINER_PORT=80
            RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=2&container_port=$CONTAINER_PORT&strict_container_port=0")
            BODY=$(echo "$RESPONSE" | sed "$d")
            CODE=$(echo "$RESPONSE" | tail -n1)
            echo "Webhook HTTP: $CODE"
            if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
              echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
              echo "::group::Chi tiết webhook JSON"
              echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
              echo "::endgroup::"
              exit 1
            fi
            echo "Deploy thành công."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
