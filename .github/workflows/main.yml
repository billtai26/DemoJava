name: CI/CD Build and Push Docker Image

# 1. Định nghĩa sự kiện kích hoạt workflow
on:
  push:
    branches: [ "master" ] # Chạy mỗi khi push code vào nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest # Sử dụng môi trường ảo Ubuntu của GitHub

    steps:
      # Bước 2: Lấy mã nguồn từ repo về máy ảo
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 3: Thiết lập Java (Cần thiết để build file .jar trước khi build Docker)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Bước 4: Build file JAR bằng Maven (Nếu bạn dùng Gradle thì đổi lệnh tương ứng)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Bước 5: Đăng nhập vào Docker Hub sử dụng Secrets đã tạo
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Bước 6: Build Docker Image và Push lên Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Thay 'user-cua-ban' thành Docker ID của bạn, 'repo-name' thành tên repo trên Docker Hub
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/spring-boot-app:latest
            ${{ secrets.DOCKER_USERNAME }}/spring-boot-app:${{ github.sha }}
